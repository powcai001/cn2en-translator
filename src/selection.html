<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>选择截图区域</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.3);
      cursor: crosshair;
      overflow: hidden;
      user-select: none;
    }

    #selection {
      border: 2px dashed #fff;
      background: rgba(59, 130, 246, 0.2);
      position: absolute;
      display: none;
      pointer-events: none;
    }

    #hint {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      padding: 10px 20px;
      border-radius: 8px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      pointer-events: none;
    }

    .coordinates {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      padding: 8px 12px;
      border-radius: 6px;
      font-family: monospace;
      font-size: 12px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="hint">拖动鼠标选择截图区域，按 ESC 取消</div>
  <div id="selection"></div>
  <div class="coordinates" id="coordinates"></div>

  <script>
    const ipcRenderer = require('electron').ipcRenderer
    const selection = document.getElementById('selection')
    const coordinates = document.getElementById('coordinates')
    let isDragging = false
    let startX, startY

    document.addEventListener('mousedown', (e) => {
      isDragging = true
      startX = e.clientX
      startY = e.clientY
      selection.style.left = startX + 'px'
      selection.style.top = startY + 'px'
      selection.style.width = '0px'
      selection.style.height = '0px'
      selection.style.display = 'block'
    })

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return

      const currentX = e.clientX
      const currentY = e.clientY
      const width = Math.abs(currentX - startX)
      const height = Math.abs(currentY - startY)
      const left = currentX < startX ? currentX : startX
      const top = currentY < startY ? currentY : startY

      selection.style.width = width + 'px'
      selection.style.height = height + 'px'
      selection.style.left = left + 'px'
      selection.style.top = top + 'px'

      coordinates.textContent = `X: ${Math.round(window.screenX + left)}, Y: ${Math.round(window.screenY + top)}, W: ${width}, H: ${height}`
    })

    document.addEventListener('mouseup', (e) => {
      if (!isDragging) return
      isDragging = false

      const width = parseInt(selection.style.width)
      const height = parseInt(selection.style.height)

      // 如果选区太小（可能是误触），忽略
      if (width < 10 || height < 10) {
        selection.style.display = 'none'
        return
      }

      ipcRenderer.send('selection-complete', {
        x: Math.round(window.screenX + parseInt(selection.style.left)),
        y: Math.round(window.screenY + parseInt(selection.style.top)),
        width: width,
        height: height
      })
    })

    // ESC 取消
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        ipcRenderer.send('selection-cancelled')
      }
    })
  </script>
</body>
</html>
